name: Release binaries

permissions:
  contents: write

on:
  release:
    types: [created]

jobs:
  releases-amd64:
    name: Release Go Binary AMD64
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build xcaddy with plugin
        run: xcaddy build --with github.com/cego/caddy-docker-api-auth@latest=./ --output caddy-docker-api-linux-amd64

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: caddy-docker-api-linux-amd64
